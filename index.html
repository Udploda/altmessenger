<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ALTMESSENGER</title>
    <style>
        :root {
            --background-color: #000000;
            --accent-color: #007aff;
            --text-color: #ffffff;
            --secondary-text-color: #8e8e93;
            --bubble-sent-color: #303030;
            --bubble-received-color: #1c1c1e;
            --glass-background: rgba(28, 28, 30, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            flex-direction: column;
            background-color: var(--background-color);
            transition: transform 0.3s ease-in-out;
        }

        .screen.active {
            display: flex;
        }
        
        .screen.from-right { transform: translateX(100%); }
        .screen.to-left { transform: translateX(-100%); }
        .screen.from-left { transform: translateX(-100%); }
        .screen.to-right { transform: translateX(100%); }


        /* Auth Screen */
        #auth-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #auth-screen h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent-color);
        }

        .auth-form input {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            background-color: var(--bubble-received-color);
            border: 1px solid var(--bubble-sent-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1em;
        }

        .auth-form button {
            width: calc(80% + 30px);
            padding: 15px;
            margin-top: 20px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }
        
        #auth-toggle {
            color: var(--accent-color);
            cursor: pointer;
            margin-top: 20px;
        }

        /* Main/Chat List Screen */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background-color: var(--glass-background);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 1.8em;
            font-weight: 700;
        }
        
        .back-button {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--accent-color);
            cursor: pointer;
        }

        #search-bar {
            width: 100%;
            padding: 10px;
            margin: 10px 15px;
            box-sizing: border-box;
            background-color: var(--bubble-received-color);
            border: none;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1em;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
        }

        .chat-list-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--bubble-received-color);
        }
        
        .chat-list-item:hover {
            background-color: var(--bubble-received-color);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .chat-info {
            flex-grow: 1;
        }

        .chat-info-name {
            font-weight: 600;
        }

        .chat-info-preview {
            color: var(--secondary-text-color);
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #fab {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background-color: var(--accent-color);
            border-radius: 50%;
            color: white;
            font-size: 36px;
            line-height: 56px;
            text-align: center;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Chat Screen */
        #chat-screen {
            padding-bottom: 70px;
        }
        
        #chat-header {
            justify-content: flex-start;
        }
        
        #chat-title {
            margin-left: 15px;
            text-align: center;
            flex-grow: 1;
        }
        
        #chat-title-name { font-weight: 600; }
        #chat-title-status { font-size: 0.8em; color: var(--secondary-text-color); }

        #message-list {
            padding: 10px;
            box-sizing: border-box;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        
        .message-bubble.sent {
            background-color: var(--accent-color);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message-bubble.received {
            background-color: var(--bubble-received-color);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .message-sender {
            font-size: 0.8em;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 5px;
        }
        
        .message-bubble img, .message-bubble video {
            width: 100%;
            border-radius: 10px;
            margin-top: 5px;
        }
        
        .message-bubble audio {
            width: 100%;
            margin-top: 5px;
        }
        
        .verified-badge {
            color: var(--accent-color);
            font-weight: bold;
        }

        #message-input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            background-color: var(--background-color);
            border-top: 1px solid var(--bubble-received-color);
        }

        #message-input {
            flex-grow: 1;
            padding: 10px;
            background-color: var(--bubble-received-color);
            border: none;
            border-radius: 18px;
            color: var(--text-color);
            font-size: 1em;
            margin: 0 5px;
        }
        
        .input-button {
            padding: 10px;
            cursor: pointer;
            font-size: 1.5em;
            color: var(--accent-color);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: var(--bubble-received-color);
            margin: auto;
            padding: 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
        }
        
        #modal-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        #modal-fullname { font-size: 1.5em; font-weight: 600; }
        #modal-username { color: var(--secondary-text-color); margin-bottom: 10px; }
        #modal-bio { margin-top: 15px; }

        /* Admin Dashboard */
        #admin-dashboard {
            padding-top: 60px; /* Header height */
        }
    </style>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-screen" class="screen active">
        <h1>ALTMESSENGER</h1>
        <div id="login-form" class="auth-form">
            <input type="text" id="login-username" placeholder="@username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password">
            <button id="login-button">Войти</button>
        </div>
        <div id="register-form" class="auth-form" style="display: none;">
            <input type="text" id="register-fullname" placeholder="Полное имя">
            <input type="text" id="register-username" placeholder="Уникальный @username">
            <input type="password" id="register-password" placeholder="Пароль">
            <input type="text" id="register-avatar" placeholder="URL аватара (необязательно)">
            <input type="text" id="register-bio" placeholder="Биография (необязательно)">
            <button id="register-button">Зарегистрироваться</button>
        </div>
        <p id="auth-toggle">Нет аккаунта? Зарегистрироваться</p>
    </div>

    <!-- Main Chat List Screen -->
    <div id="main-screen" class="screen">
        <div class="header">
            <h1 class="header-title">Чаты</h1>
        </div>
        <input type="search" id="search-bar" placeholder="Поиск пользователей и групп...">
        <div id="chat-list" class="content-area"></div>
        <div id="fab" onclick="showNewChatModal()">+</div>
    </div>
    
    <!-- Admin Dashboard Screen -->
    <div id="admin-dashboard-screen" class="screen">
        <div class="header">
            <h1 class="header-title">ADMIN DASHBOARD</h1>
        </div>
        <div id="support-ticket-list" class="content-area"></div>
    </div>


    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <div id="chat-header" class="header">
            <div class="back-button" onclick="showMainScreen()">←</div>
            <div id="chat-title">
                <div id="chat-title-name"></div>
                <div id="chat-title-status"></div>
            </div>
        </div>
        <div id="message-list" class="content-area"></div>
        <div id="message-input-container">
            <span id="record-button" class="input-button">🎤</span>
            <input type="text" id="message-input" placeholder="Сообщение...">
            <span id="send-button" class="input-button">➤</span>
        </div>
    </div>
    
    <!-- User/Profile Modal -->
    <div id="profile-modal" class="modal" onclick="closeModal(event, 'profile-modal')">
        <div class="modal-content">
            <img id="modal-avatar" src="" alt="avatar">
            <div id="modal-fullname"></div>
            <div id="modal-username"></div>
            <div id="modal-bio"></div>
        </div>
    </div>
    
    <!-- New Chat/Group Modal -->
    <div id="new-chat-modal" class="modal" onclick="closeModal(event, 'new-chat-modal')">
         <div class="modal-content">
             <h3>Новый диалог</h3>
             <button onclick="showCreateGroupForm()">Создать группу</button>
             <p>Результаты поиска появятся здесь после ввода в главном меню.</p>
             <div id="search-results-modal"></div>
         </div>
    </div>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="modal" onclick="closeModal(event, 'create-group-modal')">
        <div class="modal-content">
            <h3>Создание группы</h3>
            <input type="text" id="group-name-input" placeholder="Название группы" style="width: 90%;">
            <input type="text" id="group-avatar-input" placeholder="URL аватара группы" style="width: 90%;">
            <select id="group-type-select" style="width: 95%; padding: 10px; margin: 10px 0;">
                <option value="public">ОБЩАЯ</option>
                <option value="private">ПРИВАТНАЯ</option>
            </select>
            <input type="text" id="group-token-input" placeholder="Код доступа (для приватной)" style="display:none; width: 90%;">
            <button onclick="createGroup()">Создать</button>
        </div>
    </div>
    
    <!-- Join Private Group Modal -->
    <div id="join-group-modal" class="modal" onclick="closeModal(event, 'join-group-modal')">
        <div class="modal-content">
            <h3>Вход в приватную группу</h3>
            <p id="join-group-name"></p>
            <input type="text" id="join-group-token-input" placeholder="Access Token" style="width: 90%;">
            <button id="join-group-button">Войти</button>
        </div>
    </div>


    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 5. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAPlDFdW52RI2c2gLb9aAgmPNjT4pOLQu4",
            authDomain: "ahahk-1ae42.firebaseapp.com",
            databaseURL: "https://ahahk-1ae42-default-rtdb.firebaseio.com",
            projectId: "ahahk-1ae42",
            storageBucket: "ahahk-1ae42.firebasestorage.app",
            messagingSenderId: "881408677847",
            appId: "1:881408677847:web:7b1670945e56158ed61d92"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global State
        let currentUser = null;
        let currentChat = { id: null, type: null, name: null };
        let activeListeners = {};
        let mediaRecorder;
        let audioChunks = [];

        // DOM Elements
        const screens = {
            auth: document.getElementById('auth-screen'),
            main: document.getElementById('main-screen'),
            admin: document.getElementById('admin-dashboard-screen'),
            chat: document.getElementById('chat-screen')
        };
        
        const modals = {
            profile: document.getElementById('profile-modal'),
            newChat: document.getElementById('new-chat-modal'),
            createGroup: document.getElementById('create-group-modal'),
            joinGroup: document.getElementById('join-group-modal')
        };
        
        const messageList = document.getElementById('message-list');
        const messageInput = document.getElementById('message-input');
        const chatList = document.getElementById('chat-list');

        // --- AUTHENTICATION LOGIC ---
        document.getElementById('auth-toggle').addEventListener('click', () => {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const toggle = document.getElementById('auth-toggle');

            if (loginForm.style.display !== 'none') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggle.textContent = 'Уже есть аккаунт? Войти';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggle.textContent = 'Нет аккаунта? Зарегистрироваться';
            }
        });

        document.getElementById('register-button').addEventListener('click', () => {
            const fullName = document.getElementById('register-fullname').value;
            const username = document.getElementById('register-username').value.toLowerCase();
            const password = document.getElementById('register-password').value;
            const avatar = document.getElementById('register-avatar').value;
            const bio = document.getElementById('register-bio').value;

            if (!fullName || !username.startsWith('@') || !password) {
                alert('Пожалуйста, заполните Имя, @username и Пароль.');
                return;
            }

            database.ref('users/' + username).once('value', snapshot => {
                if (snapshot.exists()) {
                    alert('Это имя пользователя уже занято.');
                } else {
                    database.ref('users/' + username).set({
                        fullName,
                        password, // NOTE: Storing passwords in plaintext is insecure. Use Firebase Auth in a real app.
                        avatar: avatar || `https://i.pravatar.cc/150?u=${username}`,
                        bio
                    }).then(() => {
                        alert('Регистрация успешна! Теперь вы можете войти.');
                        document.getElementById('auth-toggle').click();
                    });
                }
            });
        });

        document.getElementById('login-button').addEventListener('click', () => {
            const username = document.getElementById('login-username').value.toLowerCase();
            const password = document.getElementById('login-password').value;

            if (!username.startsWith('@') || !password) {
                alert('Введите @username и пароль.');
                return;
            }
            
            if (username === '@support') {
                 database.ref('users/' + username).once('value', snapshot => {
                    if (snapshot.exists() && snapshot.val().password === password) {
                        currentUser = { username: '@support', ...snapshot.val() };
                        showAdminDashboard();
                    } else {
                         alert('Неверные учетные данные администратора.');
                    }
                 });
                 return;
            }

            database.ref('users/' + username).once('value', snapshot => {
                if (snapshot.exists() && snapshot.val().password === password) {
                    currentUser = { username, ...snapshot.val() };
                    showMainScreen();
                    loadUserChats();
                } else {
                    alert('Неверное имя пользователя или пароль.');
                }
            });
        });

        // --- SCREEN NAVIGATION ---
        function switchScreen(fromScreen, toScreen, direction) {
            if (fromScreen) {
                fromScreen.classList.add(direction === 'right' ? 'to-left' : 'to-right');
                fromScreen.classList.remove('active');
            }
            
            toScreen.classList.add('active', direction === 'right' ? 'from-right' : 'from-left');

            setTimeout(() => {
                 if (fromScreen) fromScreen.classList.remove('to-left', 'to-right');
                 toScreen.classList.remove('from-right', 'from-left');
            }, 300);
        }

        function showMainScreen() {
            clearListeners();
            switchScreen(screens.chat, screens.main, 'left');
            screens.auth.classList.remove('active');
            screens.admin.classList.remove('active');
        }
        
        function showAdminDashboard() {
            switchScreen(screens.auth, screens.admin, 'right');
            loadSupportTickets();
        }

        function showChatScreen(chatId, chatType, chatName, members) {
            currentChat = { id: chatId, type: chatType, name: chatName };
            document.getElementById('chat-title-name').textContent = chatName;
            
            let statusText = '';
            if (chatType === 'p2p') statusText = 'в сети';
            if (chatType === 'group' && members) statusText = `${Object.keys(members).length} участников`;
            if (chatType === 'support') statusText = `Тикет #${chatId}`;
            
            document.getElementById('chat-title-status').textContent = statusText;
            
            messageList.innerHTML = ''; // Clear previous messages
            loadMessages(chatId, chatType);
            switchScreen(screens.main, screens.chat, 'right');
            screens.admin.classList.remove('active');
        }
        
        // --- MESSAGING LOGIC ---
        function loadMessages(chatId, chatType) {
            clearListeners();
            let path;
            if (chatType === 'p2p') path = `p2p_messages/${chatId}`;
            else if (chatType === 'group') path = `group_messages/${chatId}`;
            else if (chatType === 'support') path = `support_tickets/${chatId}/messages`;
            
            const messagesRef = database.ref(path);
            
            // Load initial messages
            messagesRef.limitToLast(100).once('value', snapshot => {
                messageList.innerHTML = '';
                snapshot.forEach(childSnapshot => {
                    renderMessage(childSnapshot.val(), childSnapshot.key);
                });
                messageList.scrollTop = messageList.scrollHeight;
            });
            
            // Listen for new messages
            const listener = messagesRef.limitToLast(1).on('child_added', snapshot => {
                 // Avoid duplicating the initial load
                if (!document.getElementById(`msg-${snapshot.key}`)) {
                   renderMessage(snapshot.val(), snapshot.key);
                   messageList.scrollTop = messageList.scrollHeight;
                }
            });
            
            activeListeners[path] = listener;
        }

        function renderMessage(msg, msgId) {
            const isSent = msg.sender === currentUser.username;
            const bubble = document.createElement('div');
            bubble.id = `msg-${msgId}`;
            bubble.className = `message-bubble ${isSent ? 'sent' : 'received'}`;
            
            let content = '';
            // Show sender in groups and support chats
            if (currentChat.type !== 'p2p' && !isSent) {
                 content += `<div class="message-sender" onclick="showProfileModal('${msg.sender}')">${msg.sender}</div>`;
            }
            
            // Support admin badge
            if (msg.sender === '@support' && isSent) {
                 content += `<div><span class="verified-badge">✓</span> Verified Support</div>`;
            }
            
            // Message content
            if (msg.type === 'text') {
                content += msg.content;
            } else if (msg.type === 'image') {
                content += `<img src="${msg.content}" alt="image">`;
            } else if (msg.type === 'video') {
                content += `<video controls src="${msg.content}"></video>`;
            } else if (msg.type === 'voice') {
                content += `<audio controls src="${msg.content}"></audio>`;
            }
            
            bubble.innerHTML = content;
            messageList.appendChild(bubble);
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;
            
            let path;
            const messageData = {
                sender: currentUser.username,
                content: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: 'text'
            };
            
            if (currentChat.type === 'p2p') path = `p2p_messages/${currentChat.id}`;
            else if (currentChat.type === 'group') path = `group_messages/${currentChat.id}`;
            else if (currentChat.type === 'support') path = `support_tickets/${currentChat.id}/messages`;

            database.ref(path).push(messageData);
            
            // Update last message preview
            const lastMessage = {
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                sender: currentUser.username
            }
            if(currentChat.type === 'p2p') {
                database.ref(`/users/${currentUser.username}/chats/${currentChat.id}`).update({lastMessage});
                const otherUser = currentChat.id.replace(currentUser.username, '').replace('-', '');
                database.ref(`/users/${otherUser}/chats/${currentChat.id}`).update({lastMessage});
            } else if (currentChat.type === 'group') {
                database.ref(`/group_metadata/${currentChat.id}/lastMessage`).update(lastMessage);
            } else if (currentChat.type === 'support') {
                database.ref(`/support_tickets/${currentChat.id}/lastMessage`).update(lastMessage);
            }

            messageInput.value = '';
            messageInput.focus();
        }

        document.getElementById('send-button').addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function clearListeners() {
            for (const path in activeListeners) {
                database.ref(path).off('child_added', activeListeners[path]);
            }
            activeListeners = {};
        }

        // --- CHAT LIST & USER MANAGEMENT ---
        function loadUserChats() {
             const userChatsRef = database.ref(`users/${currentUser.username}/chats`).orderByChild('lastMessage/timestamp');
             userChatsRef.on('value', snapshot => {
                 chatList.innerHTML = '';
                 snapshot.forEach(childSnapshot => {
                     const chat = childSnapshot.val();
                     const chatId = childSnapshot.key;
                     if(chat.type === 'p2p') {
                         const otherUsername = chatId.replace(currentUser.username, '').replace('-', '');
                         database.ref(`users/${otherUsername}`).once('value', userSnap => {
                             const userData = userSnap.val();
                             renderChatListItem(chatId, 'p2p', otherUsername, userData.avatar, chat.lastMessage);
                         });
                     } else if (chat.type === 'group') {
                         database.ref(`group_metadata/${chatId}`).once('value', groupSnap => {
                            const groupData = groupSnap.val();
                            renderChatListItem(chatId, 'group', groupData.name, groupData.avatar, groupData.lastMessage, groupData.members);
                         });
                     }
                 });
             });
        }
        
        function renderChatListItem(id, type, name, avatarUrl, lastMessage, members) {
             const item = document.createElement('div');
             item.className = 'chat-list-item';
             item.onclick = () => showChatScreen(id, type, name, members);
             
             let preview = '';
             if (lastMessage) {
                 const sender = lastMessage.sender === currentUser.username ? 'Вы: ' : '';
                 preview = sender + lastMessage.text;
             }
             
             item.innerHTML = `
                <img src="${avatarUrl || `https://i.pravatar.cc/150?u=${name}`}" alt="avatar" class="avatar" onclick="event.stopPropagation(); showProfileModal('${name}')">
                <div class="chat-info">
                    <div class="chat-info-name">${name}</div>
                    <div class="chat-info-preview">${preview}</div>
                </div>
             `;
             chatList.prepend(item);
        }

        // --- SEARCH LOGIC ---
        document.getElementById('search-bar').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const resultsContainer = document.getElementById('search-results-modal');
            resultsContainer.innerHTML = '';
            
            if (query.length < 2) return;
            
            // Search users
            database.ref('users').orderByKey().startAt(query).endAt(query + "\uf8ff").limitToFirst(5).once('value', snapshot => {
                snapshot.forEach(userSnap => {
                    const username = userSnap.key;
                    if (username === currentUser.username) return;
                    const userData = userSnap.val();
                    const resultItem = document.createElement('div');
                    resultItem.className = 'chat-list-item';
                    resultItem.innerHTML = `<img src="${userData.avatar}" class="avatar"> <div>${userData.fullName} <span style="color: var(--secondary-text-color)">${username}</span></div>`;
                    resultItem.onclick = () => startP2PChat(username, userData);
                    resultsContainer.appendChild(resultItem);
                });
            });

            // Search public groups
            database.ref('group_metadata').orderByChild('name_lowercase').startAt(query).endAt(query + "\uf8ff").limitToFirst(5).once('value', snapshot => {
                snapshot.forEach(groupSnap => {
                    const groupData = groupSnap.val();
                    if (groupData.type === 'public') {
                        const resultItem = document.createElement('div');
                        resultItem.className = 'chat-list-item';
                        resultItem.innerHTML = `<img src="${groupData.avatar}" class="avatar"> <div>${groupData.name} <span style="color: var(--secondary-text-color)">(Группа)</span></div>`;
                        resultItem.onclick = () => joinPublicGroup(groupSnap.key, groupData);
                        resultsContainer.appendChild(resultItem);
                    } else if (query === groupSnap.key) { // Allow searching private group by ID
                        const resultItem = document.createElement('div');
                        resultItem.className = 'chat-list-item';
                        resultItem.innerHTML = `<img src="${groupData.avatar}" class="avatar"> <div>${groupData.name} <span style="color: var(--secondary-text-color)">(Приватная группа)</span></div>`;
                        resultItem.onclick = () => promptForPrivateGroup(groupSnap.key, groupData.name);
                        resultsContainer.appendChild(resultItem);
                    }
                });
            });
        });
        
        function startP2PChat(otherUsername, otherUserData) {
            closeModal(null, 'new-chat-modal');
            const sortedUsernames = [currentUser.username, otherUsername].sort();
            const chatId = sortedUsernames.join('-');
            
            // Add chat to both users' records
            database.ref(`users/${currentUser.username}/chats/${chatId}`).set({ type: 'p2p' });
            database.ref(`users/${otherUsername}/chats/${chatId}`).set({ type: 'p2p' });
            
            showChatScreen(chatId, 'p2p', otherUsername);
        }

        // --- GROUP LOGIC ---
        document.getElementById('group-type-select').addEventListener('change', (e) => {
            document.getElementById('group-token-input').style.display = e.target.value === 'private' ? 'block' : 'none';
        });

        function createGroup() {
            const name = document.getElementById('group-name-input').value;
            const avatar = document.getElementById('group-avatar-input').value;
            const type = document.getElementById('group-type-select').value;
            const token = document.getElementById('group-token-input').value;
            
            if (!name) {
                alert('Название группы обязательно.');
                return;
            }
            if (type === 'private' && !token) {
                alert('Для приватной группы нужен код доступа.');
                return;
            }
            
            const newGroupRef = database.ref('group_metadata').push();
            const groupId = newGroupRef.key;
            
            const groupData = {
                name: name,
                name_lowercase: name.toLowerCase(),
                avatar: avatar || `https://i.pravatar.cc/150?u=${groupId}`,
                type: type,
                owner: currentUser.username,
                members: { [currentUser.username]: true },
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };
            if (type === 'private') {
                groupData.token = token;
            }
            
            newGroupRef.set(groupData).then(() => {
                database.ref(`users/${currentUser.username}/chats/${groupId}`).set({ type: 'group' });
                closeModal(null, 'create-group-modal');
                showChatScreen(groupId, 'group', name, groupData.members);
            });
        }
        
        function joinPublicGroup(groupId, groupData) {
            database.ref(`group_metadata/${groupId}/members/${currentUser.username}`).set(true);
            database.ref(`users/${currentUser.username}/chats/${groupId}`).set({ type: 'group' });
            closeModal(null, 'new-chat-modal');
            showChatScreen(groupId, 'group', groupData.name, groupData.members);
        }
        
        function promptForPrivateGroup(groupId, groupName) {
            closeModal(null, 'new-chat-modal');
            modals.joinGroup.style.display = 'flex';
            document.getElementById('join-group-name').textContent = `Войти в "${groupName}"`;
            document.getElementById('join-group-button').onclick = () => attemptToJoinPrivateGroup(groupId);
        }
        
        function attemptToJoinPrivateGroup(groupId) {
             const token = document.getElementById('join-group-token-input').value;
             database.ref(`group_metadata/${groupId}/token`).once('value', snapshot => {
                 if (snapshot.val() === token) {
                     database.ref(`group_metadata/${groupId}/members/${currentUser.username}`).set(true);
                     database.ref(`users/${currentUser.username}/chats/${groupId}`).set({ type: 'group' });
                     closeModal(null, 'join-group-modal');
                     database.ref(`group_metadata/${groupId}`).once('value', groupSnap => {
                         showChatScreen(groupId, 'group', groupSnap.val().name, groupSnap.val().members);
                     });
                 } else {
                     alert('Неверный код');
                 }
             });
        }


        // --- MODAL & UI/UX LOGIC ---
        function showProfileModal(username) {
             if (!username) return;
             database.ref('users/' + username).once('value', snapshot => {
                 if(snapshot.exists()) {
                     const userData = snapshot.val();
                     document.getElementById('modal-avatar').src = userData.avatar || `https://i.pravatar.cc/150?u=${username}`;
                     document.getElementById('modal-fullname').textContent = userData.fullName;
                     document.getElementById('modal-username').textContent = username;
                     document.getElementById('modal-bio').textContent = userData.bio || '';
                     modals.profile.style.display = 'flex';
                 }
             });
        }
        
        function showNewChatModal() {
            modals.newChat.style.display = 'flex';
            document.getElementById('search-bar').focus();
        }
        
        function showCreateGroupForm() {
            closeModal(null, 'new-chat-modal');
            modals.createGroup.style.display = 'flex';
        }

        function closeModal(event, modalId) {
            if (event && event.target.id !== modalId) return; // only close if background is clicked
            document.getElementById(modalId).style.display = 'none';
        }
        
        // --- MULTIMEDIA ---
        const recordButton = document.getElementById('record-button');
        recordButton.addEventListener('click', toggleRecording);
        
        function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                recordButton.textContent = '🎤';
                recordButton.style.color = 'var(--accent-color)';
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        mediaRecorder = new MediaRecorder(stream);
                        mediaRecorder.start();
                        audioChunks = [];
                        recordButton.textContent = '🛑';
                        recordButton.style.color = 'red';
                        
                        mediaRecorder.addEventListener("dataavailable", event => {
                            audioChunks.push(event.data);
                        });

                        mediaRecorder.addEventListener("stop", () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' }); // or 'audio/webm' etc.
                            const reader = new FileReader();
                            reader.readAsDataURL(audioBlob);
                            reader.onloadend = function() {
                                const base64data = reader.result;
                                sendMediaMessage(base64data, 'voice');
                            }
                        });
                    });
            }
        }
        
        function sendMediaMessage(content, type) {
            let path;
            const messageData = {
                sender: currentUser.username,
                content: content,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                type: type
            };
            
            if (currentChat.type === 'p2p') path = `p2p_messages/${currentChat.id}`;
            else if (currentChat.type === 'group') path = `group_messages/${currentChat.id}`;
            else if (currentChat.type === 'support') path = `support_tickets/${currentChat.id}/messages`;
            
            database.ref(path).push(messageData);
        }
        
        // --- ADMIN / SUPPORT LOGIC ---
        function loadSupportTickets() {
            const ticketsRef = database.ref('support_tickets').orderByChild('lastMessage/timestamp');
            const listEl = document.getElementById('support-ticket-list');
            
            ticketsRef.on('value', snapshot => {
                listEl.innerHTML = '';
                 snapshot.forEach(ticketSnap => {
                     const ticketId = ticketSnap.key;
                     const ticketData = ticketSnap.val();
                     const user = ticketData.user;
                     
                     const item = document.createElement('div');
                     item.className = 'chat-list-item';
                     item.onclick = () => showChatScreen(ticketId, 'support', `Support: ${user}`, null);
                     
                     item.innerHTML = `
                        <div class="chat-info">
                            <div class="chat-info-name">Тикет от: ${user}</div>
                            <div class="chat-info-preview">${ticketData.lastMessage?.text || 'Нет сообщений'}</div>
                        </div>
                     `;
                     listEl.prepend(item);
                 });
            });
        }
        
        // Add a dummy support user if it doesn't exist for login. In a real app this would be pre-configured.
        database.ref('users/@support').once('value', s => { if(!s.exists()) database.ref('users/@support').set({fullName: "Support Admin", password: "supportpassword"})});
        
    </script>
</body>
