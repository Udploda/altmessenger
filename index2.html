<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ALTMESSENGER</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--accent:#007aff;--text:#fff;--text2:#8e8e93;
--danger:#ff3b30;--success:#30d158;--border:#38383a;--input:#1c1c1e;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
input,textarea,button{font-family:inherit;outline:none;border:none;}
input,textarea{background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:15px;width:100%;transition:border-color .2s;}
input:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:none;min-height:60px;}
button{cursor:pointer;background:var(--accent);color:#fff;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:600;transition:all .15s;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(.97);opacity:.85;}
.btn-secondary{background:var(--card2);color:var(--text);}
.btn-danger{background:var(--danger);}
.btn-ghost{background:transparent;color:var(--accent);padding:8px 12px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* APP CONTAINER */
#app{width:100%;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:1;}
.screen.active{display:flex;}

/* AUTH SCREEN */
#authScreen{justify-content:center;align-items:center;padding:24px;}
.auth-container{width:100%;max-width:380px;}
.auth-logo{text-align:center;margin-bottom:40px;}
.auth-logo h1{font-size:28px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#007aff,#5856d6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:6px;}
.auth-tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;text-align:center;padding:10px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2);background:transparent;transition:all .2s;cursor:pointer;}
.auth-tab.active{background:var(--accent);color:#fff;}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-form .field-hint{font-size:11px;color:var(--text2);margin-top:-6px;padding-left:4px;}
.auth-error{color:var(--danger);font-size:13px;text-align:center;min-height:18px;}

/* MAIN SCREEN */
#mainScreen .main-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;}
#mainScreen .main-header h2{font-size:18px;font-weight:700;letter-spacing:1px;}
.header-actions{display:flex;gap:8px;}
.header-actions button{width:36px;height:36px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--card);}

/* SEARCH BAR */
.search-bar{padding:8px 16px;}
.search-bar input{background:var(--card);border-radius:10px;padding:10px 14px 10px 36px;font-size:14px;border:none;}
.search-bar .search-wrap{position:relative;}
.search-bar .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none;}

/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;transition:background .15s;cursor:pointer;position:relative;}
.chat-item:active{background:var(--card);}
.chat-item .avatar{width:52px;height:52px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden;cursor:pointer;}
.chat-item .avatar img{width:100%;height:100%;object-fit:cover;}
.chat-item .chat-info{flex:1;min-width:0;}
.chat-item .chat-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:4px;}
.chat-item .chat-preview{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-item .chat-time{font-size:11px;color:var(--text2);flex-shrink:0;align-self:flex-start;margin-top:4px;}
.chat-item .unread-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;}
.verified{color:var(--accent);font-size:14px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2);}
.empty-state .emoji{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;text-align:center;}

/* TAB BAR */
.tab-bar{display:flex;border-top:1px solid var(--border);background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:6px 0 env(safe-area-inset-bottom,8px);}
.tab-bar button{flex:1;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:10px;color:var(--text2);border-radius:0;}
.tab-bar button.active{color:var(--accent);}
.tab-bar button .tab-icon{font-size:22px;}

/* CHAT SCREEN */
#chatScreen{z-index:5;}
.chat-header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;}
.chat-header .back-btn{background:transparent;color:var(--accent);font-size:24px;padding:4px 8px;width:auto;}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;overflow:hidden;flex-shrink:0;cursor:pointer;}
.chat-header .avatar img{width:100%;height:100%;object-fit:cover;}
.chat-header .chat-title{flex:1;min-width:0;}
.chat-header .chat-title h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:4px;}
.chat-header .chat-title p{font-size:11px;color:var(--text2);}

/* GROUP SETTINGS BUTTON in chat header */
.chat-header .group-settings-btn{width:32px;height:32px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card);flex-shrink:0;margin-left:4px;}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch;}
.msg{max-width:78%;padding:8px 12px;border-radius:16px;font-size:15px;line-height:1.4;word-break:break-word;position:relative;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.sent{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg.received{align-self:flex-start;background:var(--card);border-bottom-left-radius:4px;}
.msg .msg-sender{font-size:11px;font-weight:600;color:#5ac8fa;margin-bottom:2px;display:flex;align-items:center;gap:3px;cursor:pointer;}
.msg .msg-time{font-size:10px;opacity:.6;text-align:right;margin-top:2px;}
.msg .msg-media{max-width:100%;border-radius:10px;margin:4px 0;}
.msg .msg-media img{max-width:100%;border-radius:10px;cursor:pointer;}
.msg .msg-media video{max-width:100%;border-radius:10px;}
.date-separator{text-align:center;font-size:12px;color:var(--text2);padding:8px 0;align-self:center;background:var(--bg);padding:4px 12px;border-radius:10px;}

/* MESSAGE INPUT */
.msg-input-bar{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));}
.msg-input-bar input{flex:1;border-radius:20px;padding:10px 16px;font-size:15px;background:var(--card);border:none;}
.msg-input-bar .send-btn{width:36px;height:36px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* ADMIN PANEL */
#adminScreen{z-index:6;}
.admin-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.85);backdrop-filter:blur(20px);}
.admin-header .back-btn{background:transparent;color:var(--accent);font-size:24px;padding:4px 8px;width:auto;}
.admin-header h2{font-size:18px;font-weight:700;}
.admin-badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;}
.ticket-list{flex:1;overflow-y:auto;}
.ticket-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.ticket-item:active{background:var(--card);}
.ticket-item .ticket-avatar{width:44px;height:44px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;overflow:hidden;}
.ticket-item .ticket-avatar img{width:100%;height:100%;object-fit:cover;}
.ticket-item .ticket-info{flex:1;min-width:0;}
.ticket-item .ticket-name{font-size:14px;font-weight:600;}
.ticket-item .ticket-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

/* CREATE GROUP */
#createGroupScreen{z-index:6;}
.create-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.85);backdrop-filter:blur(20px);}
.create-header .back-btn{background:transparent;color:var(--accent);font-size:24px;padding:4px 8px;width:auto;}
.create-header h2{font-size:18px;font-weight:700;flex:1;}
.create-form{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
.create-form label{font-size:13px;color:var(--text2);margin-bottom:-10px;}
.form-row{display:flex;gap:12px;align-items:center;}
.form-row label.toggle-label{font-size:14px;flex:1;}
.toggle{position:relative;width:51px;height:31px;flex-shrink:0;}
.toggle input{display:none;}
.toggle .slider{position:absolute;inset:0;background:var(--card2);border-radius:16px;transition:.3s;cursor:pointer;}
.toggle .slider::before{content:'';position:absolute;width:27px;height:27px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s;}
.toggle input:checked+.slider{background:var(--success);}
.toggle input:checked+.slider::before{left:22px;}

/* PROFILE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30000;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s;}
.modal-overlay.active{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-content{background:var(--card);border-radius:20px;width:100%;max-width:360px;overflow:hidden;animation:slideUp .3s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-close{position:absolute;top:12px;right:12px;background:var(--card2);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2;cursor:pointer;color:var(--text);border:none;}
.profile-modal-inner{position:relative;padding:24px;text-align:center;}
.profile-modal-inner .profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--card2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;overflow:hidden;}
.profile-modal-inner .profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-modal-inner .profile-name{font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;}
.profile-modal-inner .profile-id{font-size:13px;color:var(--text2);margin-top:2px;}
.profile-modal-inner .profile-bio{font-size:14px;color:var(--text2);margin-top:8px;line-height:1.4;}
.profile-edit-fields{display:flex;flex-direction:column;gap:10px;margin-top:16px;text-align:left;}
.profile-edit-fields label{font-size:12px;color:var(--text2);}
.profile-edit-fields input,.profile-edit-fields textarea{font-size:14px;padding:10px 12px;}
.profile-actions{display:flex;gap:8px;margin-top:16px;}
.profile-actions button{flex:1;padding:10px;font-size:14px;}
.profile-support-warning{margin-top:12px;padding:10px 14px;background:rgba(0,122,255,.1);border:1px solid rgba(0,122,255,.25);border-radius:10px;font-size:12px;color:var(--accent);line-height:1.4;text-align:left;}
.profile-verified-badge{margin-top:10px;font-size:13px;color:var(--success);font-weight:600;}
.profile-verify-btn{margin-top:10px;background:var(--success);padding:8px 16px;font-size:13px;border-radius:10px;}

/* GROUP PREVIEW MODAL */
.group-preview-inner{position:relative;padding:28px 24px;text-align:center;}
.group-preview-inner .gp-avatar{width:72px;height:72px;border-radius:50%;background:var(--card2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;overflow:hidden;}
.group-preview-inner .gp-avatar img{width:100%;height:100%;object-fit:cover;}
.group-preview-inner .gp-name{font-size:18px;font-weight:700;}
.group-preview-inner .gp-id{font-size:13px;color:var(--text2);margin-top:2px;}
.group-preview-inner .gp-bio{font-size:14px;color:var(--text2);margin-top:10px;line-height:1.4;}
.group-preview-inner .gp-join-btn{margin-top:20px;width:100%;padding:14px;font-size:16px;font-weight:700;border-radius:14px;}
.group-preview-inner .gp-joined{margin-top:20px;color:var(--success);font-size:14px;font-weight:600;}

/* GROUP SETTINGS MODAL */
.group-settings-inner{position:relative;padding:24px;text-align:center;}
.group-settings-inner .gs-avatar{width:72px;height:72px;border-radius:50%;background:var(--card2);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;overflow:hidden;}
.group-settings-inner .gs-avatar img{width:100%;height:100%;object-fit:cover;}
.group-settings-inner .gs-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.group-settings-inner .gs-id{font-size:12px;color:var(--text2);margin-bottom:16px;}
.group-settings-fields{display:flex;flex-direction:column;gap:10px;text-align:left;}
.group-settings-fields label{font-size:12px;color:var(--text2);display:block;margin-bottom:-4px;}
.group-settings-fields input,.group-settings-fields textarea{font-size:14px;padding:10px 12px;}
.group-settings-fields .form-row{display:flex;gap:12px;align-items:center;}
.group-settings-fields .form-row label.toggle-label{font-size:14px;flex:1;color:var(--text);margin-bottom:0;}
.gs-access-key-row{display:none;}
.gs-divider{height:1px;background:var(--border);margin:4px 0;}
.gs-actions{display:flex;gap:8px;margin-top:16px;}
.gs-actions button{flex:1;padding:11px;font-size:14px;}
.gs-error{color:var(--danger);font-size:12px;text-align:center;min-height:16px;margin-top:4px;}
.gs-danger-zone{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.gs-danger-zone button{width:100%;padding:10px;font-size:13px;background:rgba(255,59,48,.12);color:var(--danger);}

/* ACCESS KEY MODAL */
.access-key-inner{padding:24px;text-align:center;}
.access-key-inner h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.access-key-inner p{font-size:13px;color:var(--text2);margin-bottom:16px;}
.access-key-inner input{margin-bottom:12px;}
.access-key-inner .ak-actions{display:flex;gap:8px;}
.access-key-inner .ak-actions button{flex:1;}

/* SEARCH RESULTS */
.search-results{padding:0 16px;}
.search-results .sr-title{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;padding:8px 0;letter-spacing:.5px;}

/* SETTINGS SCREEN */
#settingsScreen{z-index:4;}
.settings-list{flex:1;overflow-y:auto;padding:8px 0;}
.settings-item{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .15s;}
.settings-item:active{background:var(--card);}
.settings-item .si-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.settings-item .si-label{font-size:15px;flex:1;}
.settings-item .si-arrow{color:var(--text2);font-size:18px;}
.settings-section-title{font-size:12px;color:var(--text2);text-transform:uppercase;padding:16px 16px 6px;letter-spacing:.5px;}

/* IMAGE VIEWER */
.image-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:40000;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.image-viewer.active{display:flex;}
.image-viewer img{max-width:95%;max-height:90vh;border-radius:8px;}

/* LOADING */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RESPONSIVE */
@media(max-width:480px){
  #app{max-width:100%;}
}
</style>
</head>
<body>
<div id="app">

<!-- AUTH SCREEN -->
<div id="authScreen" class="screen active">
<div class="auth-container">
  <div class="auth-logo">
    <h1>ALTMESSENGER</h1>
    <p>Безопасный мессенджер нового поколения</p>
  </div>
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchAuthTab('login')">Вход</div>
    <div class="auth-tab" onclick="switchAuthTab('register')">Регистрация</div>
  </div>
  <div id="loginForm" class="auth-form">
    <input type="text" id="loginId" placeholder="@ID (имя пользователя)" autocomplete="off" autocapitalize="off">
    <input type="password" id="loginPass" placeholder="Пароль">
    <div id="loginError" class="auth-error"></div>
    <button onclick="doLogin()">Войти</button>
  </div>
  <div id="registerForm" class="auth-form" style="display:none;">
    <input type="text" id="regId" placeholder="@ID (только A-Z, 0-9)" autocomplete="off" autocapitalize="off">
    <div class="field-hint">Латинские буквы и цифры, 4-30 символов</div>
    <input type="text" id="regNick" placeholder="Никнейм (любые символы/эмодзи)">
    <input type="password" id="regPass" placeholder="Пароль">
    <div id="regError" class="auth-error"></div>
    <button onclick="doRegister()">Создать аккаунт</button>
  </div>
</div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" class="screen">
  <div class="main-header">
    <h2>ALTMESSENGER</h2>
    <div class="header-actions">
      <button onclick="openCreateGroup()" title="Создать группу">＋</button>
    </div>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="globalSearch" placeholder="Поиск по @ID группы или юзера..." autocomplete="off" oninput="onGlobalSearch(this.value)">
    </div>
  </div>
  <div id="searchResults" class="search-results" style="display:none;"></div>
  <div id="chatList" class="chat-list"></div>
  <div class="tab-bar">
    <button class="active" onclick="switchTab('chats',this)"><span class="tab-icon">💬</span>Чаты</button>
    <button onclick="openSupportChat()"><span class="tab-icon">🛟</span>Поддержка</button>
    <button onclick="switchTab('settings',this)"><span class="tab-icon">⚙️</span>Настройки</button>
  </div>
</div>

<!-- SETTINGS SCREEN -->
<div id="settingsScreen" class="screen">
  <div class="main-header">
    <h2>Настройки</h2>
    <div class="header-actions">
      <button onclick="showScreen('mainScreen')" style="font-size:14px;">✕</button>
    </div>
  </div>
  <div class="settings-list">
    <div class="settings-section-title">Аккаунт</div>
    <div class="settings-item" onclick="openProfile(currentUser.id)">
      <div class="si-icon" style="background:#007aff22;color:var(--accent);">👤</div>
      <span class="si-label">Мой профиль</span>
      <span class="si-arrow">›</span>
    </div>
    <div id="adminPanelBtn" class="settings-item" style="display:none;" onclick="openAdminPanel()">
      <div class="si-icon" style="background:#ff3b3022;color:var(--danger);">🛡️</div>
      <span class="si-label">Админ-панель</span>
      <span class="si-arrow">›</span>
    </div>
    <div class="settings-section-title">Приложение</div>
    <div class="settings-item" onclick="openSupportChat()">
      <div class="si-icon" style="background:#30d15822;color:var(--success);">✉️</div>
      <span class="si-label">Написать в поддержку</span>
      <span class="si-arrow">›</span>
    </div>
    <div class="settings-section-title" style="margin-top:20px;"></div>
    <div class="settings-item" onclick="doLogout()">
      <div class="si-icon" style="background:#ff3b3022;color:var(--danger);">🚪</div>

<script>
// ============ FIREBASE INIT ============
const firebaseConfig = {
  apiKey: "AIzaSyAPlDFdW52RI2c2gLb9aAgmPNjT4pOLQu4",
  authDomain: "ahahk-1ae42.firebaseapp.com",
  databaseURL: "https://ahahk-1ae42-default-rtdb.firebaseio.com",
  projectId: "ahahk-1ae42",
  storageBucket: "ahahk-1ae42.firebasestorage.app",
  messagingSenderId: "881408677847",
  appId: "1:881408677847:web:7b1670945e56158ed61d92"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============ USER CACHE ============
const userCache = {};

async function fetchUser(userId) {
  if (!userId) return null;
  if (userCache[userId] && (Date.now() - userCache[userId]._cachedAt < 30000)) {
    return userCache[userId];
  }
  try {
    const snap = await db.ref('users/' + userId).once('value');
    if (snap.exists()) {
      const u = snap.val();
      u._cachedAt = Date.now();
      userCache[userId] = u;
      return u;
    }
  } catch(e) { console.error('fetchUser error:', e); }
  return null;
}

function invalidateUserCache(userId) {
  delete userCache[userId];
}

// ============ STATE ============
let currentUser = null;
let currentChat = null;
let chatListeners = {};
let activeChatListener = null;
let chatListDmListener = null;
let chatListJoinedListener = null;
let chatListSupportListener = null;
let groupSettingsLiveListener = null; // live listener for group settings

// ============ AUTH ============
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='login'?i===0:i===1));
  });
  document.getElementById('loginForm').style.display = tab==='login'?'flex':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'flex':'none';
}

async function doLogin() {
  const id = document.getElementById('loginId').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!id || !pass) { errEl.textContent = 'Заполните все поля'; return; }

  if (id === 'support' && pass === 'admin123') {
    const adminData = {
      id: 'support',
      nickname: 'Поддержка ALTMESSENGER',
      avatar: '',
      bio: 'Официальная поддержка ALTMESSENGER',
      password: pass,
      role: 'admin',
      verified: true,
      created: Date.now()
    };
    await db.ref('users/support').set(adminData);
    currentUser = adminData;
    localStorage.setItem('current_user', JSON.stringify(currentUser));
    initApp();
    return;
  }

  try {
    const snap = await db.ref('users/' + id).once('value');
    if (!snap.exists()) { errEl.textContent = 'Пользователь не найден'; return; }
    const data = snap.val();
    if (data.password !== pass) { errEl.textContent = 'Неверный пароль'; return; }
    currentUser = data;
    localStorage.setItem('current_user', JSON.stringify(currentUser));
    initApp();
  } catch(e) {
    errEl.textContent = 'Ошибка подключения';
    console.error(e);
  }
}

async function doRegister() {
  const id = document.getElementById('regId').value.trim().toLowerCase();
  const nick = document.getElementById('regNick').value.trim();
  const pass = document.getElementById('regPass').value;
  const errEl = document.getElementById('regError');
  errEl.textContent = '';

  if (!id || !nick || !pass) { errEl.textContent = 'Заполните все поля'; return; }
  if (!/^[a-z0-9]{4,30}$/.test(id)) { errEl.textContent = 'ID: только a-z, 0-9 (4-30 символов)'; return; }
  if (pass.length < 4) { errEl.textContent = 'Пароль минимум 4 символа'; return; }

  try {
    const snap = await db.ref('users/' + id).once('value');
    if (snap.exists()) { errEl.textContent = 'Этот @ID уже занят'; return; }
    const userData = {
      id: id,
      nickname: nick,
      avatar: '',
      bio: '',
      password: pass,
      role: 'user',
      verified: false,
      created: Date.now()
    };
    await db.ref('users/' + id).set(userData);
    currentUser = userData;
    localStorage.setItem('current_user', JSON.stringify(currentUser));
    initApp();
  } catch(e) {
    errEl.textContent = 'Ошибка: ' + e.message;
    console.error(e);
  }
}

function doLogout() {
  if (chatListDmListener) { db.ref('dms').off('value', chatListDmListener); chatListDmListener = null; }
  if (chatListJoinedListener) { chatListJoinedListener(); chatListJoinedListener = null; }
  if (chatListSupportListener) { chatListSupportListener(); chatListSupportListener = null; }
  if (activeChatListener) { activeChatListener(); activeChatListener = null; }
  if (groupSettingsLiveListener) { groupSettingsLiveListener(); groupSettingsLiveListener = null; }
  currentUser = null;
  currentChat = null;
  localStorage.removeItem('current_user');
  showScreen('authScreen');
}

// ============ SCREEN MANAGEMENT ============
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function switchTab(tab, btn) {
  if (tab === 'chats') {
    showScreen('mainScreen');
  } else if (tab === 'settings') {
    showScreen('settingsScreen');
  }
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ============ INIT APP ============
function initApp() {
  showScreen('mainScreen');
  if (currentUser.role === 'admin' || currentUser.id === 'support') {
    document.getElementById('adminPanelBtn').style.display = 'flex';
  } else {
    document.getElementById('adminPanelBtn').style.display = 'none';
  }
  loadChatList();
}

// ============ CHAT LIST ============
let chatItems = {};

function loadChatList() {
  chatItems = {};
  const listEl = document.getElementById('chatList');

  const dmRef = db.ref('dms');
  if (chatListDmListener) dmRef.off('value', chatListDmListener);
  chatListDmListener = dmRef.on('value', snap => {
    const dms = snap.val() || {};
    Object.keys(chatItems).forEach(k => { if (k.startsWith('dm_')) delete chatItems[k]; });
    Object.keys(dms).forEach(dmId => {
      const parts = dmId.split('_');
      if (parts.includes(currentUser.id)) {
        const otherId = parts[0] === currentUser.id ? parts[1] : parts[0];
        if (otherId === currentUser.id) return;
        chatItems['dm_' + dmId] = { id: dmId, type: 'dm', otherId: otherId };
      }
    });
    renderChatList();
  });

  if (currentUser.id !== 'support') {
    const supportChatId = [currentUser.id, 'support'].sort().join('_');
    const supportRef = db.ref('support_chats/' + supportChatId);
    if (chatListSupportListener) chatListSupportListener();
    const supportCb = supportRef.on('value', snap => {
      if (snap.exists()) {
        chatItems['support_' + supportChatId] = { id: supportChatId, type: 'support', otherId: 'support' };
      }
      renderChatList();
    });
    chatListSupportListener = () => supportRef.off('value', supportCb);
  }

  const joinedRef = db.ref('users/' + currentUser.id + '/joined_groups');
  if (chatListJoinedListener) chatListJoinedListener();
  const joinedCb = joinedRef.on('value', snap => {
    Object.keys(chatItems).forEach(k => { if (k.startsWith('group_')) delete chatItems[k]; });
    const groups = snap.val() || {};
    Object.keys(groups).forEach(gid => {
      chatItems['group_' + gid] = { id: gid, type: 'group' };
    });
    renderChatList();
  });
  chatListJoinedListener = () => joinedRef.off('value', joinedCb);
}

let renderDebounce = null;
function renderChatList() {
  clearTimeout(renderDebounce);
  renderDebounce = setTimeout(() => doRenderChatList(), 150);
}

async function doRenderChatList() {
  const listEl = document.getElementById('chatList');
  const keys = Object.keys(chatItems);
  if (keys.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><span class="emoji">💬</span><p>Нет чатов.<br>Найдите группу через поиск или напишите в поддержку.</p></div>';
    return;
  }

  let items = [];
  for (const key of keys) {
    const item = chatItems[key];
    let chatData = { key, ...item, name: '', avatar: '', lastMsg: '', lastTime: 0, showVerified: false };
    try {
      if (item.type === 'dm') {
        const u = await fetchUser(item.otherId);
        if (u) {
          chatData.name = u.nickname || u.id;
          chatData.avatar = u.avatar || '';
          chatData.showVerified = (item.otherId === 'support' || u.verified === true);
        } else {
          chatData.name = '@' + item.otherId;
        }
        const msgSnap = await db.ref('messages/dm_' + item.id).orderByKey().limitToLast(1).once('value');
        msgSnap.forEach(m => {
          const v = m.val();
          chatData.lastMsg = v.text || '📎 Медиа';
          chatData.lastTime = v.timestamp || 0;
        });
      } else if (item.type === 'group') {
        const gSnap = await db.ref('groups/' + item.id).once('value');
        const g = gSnap.val();
        if (g) {
          chatData.name = g.name || item.id;
          chatData.avatar = g.avatar || '';
        } else {
          chatData.name = '@' + item.id;
        }
        const msgSnap = await db.ref('messages/group_' + item.id).orderByKey().limitToLast(1).once('value');
        msgSnap.forEach(m => {
          const v = m.val();
          chatData.lastMsg = v.text || '📎 Медиа';
          chatData.lastTime = v.timestamp || 0;
        });
      } else if (item.type === 'support') {
        chatData.name = 'Поддержка ALTMESSENGER';
        chatData.showVerified = true;
        const msgSnap = await db.ref('messages/support_' + item.id).orderByKey().limitToLast(1).once('value');
        msgSnap.forEach(m => {
          const v = m.val();
          chatData.lastMsg = v.text || '📎 Медиа';
          chatData.lastTime = v.timestamp || 0;
        });
      }
    } catch(e) { console.error(e); }
    items.push(chatData);
  }

  items.sort((a,b) => b.lastTime - a.lastTime);

  let html = '';
  for (const it of items) {
    const initials = getInitials(it.name);
    const avHtml = it.avatar ? '<img src="' + escHtml(it.avatar) + '" alt="">' : initials;
    const verifiedMark = it.showVerified ? ' <span class="verified">✓</span>' : '';
    const timeStr = it.lastTime ? formatTime(it.lastTime) : '';
    let avatarProfileId = '';
    if (it.type === 'dm' || it.type === 'support') {
      avatarProfileId = it.otherId || '';
    }
    let avatarOnclick = '';
    if (it.type === 'group') {
      avatarOnclick = "event.stopPropagation();openGroupPreview('" + escHtml(it.id) + "')";
    } else if (avatarProfileId) {
      avatarOnclick = "event.stopPropagation();openProfile('" + escHtml(avatarProfileId) + "')";
    }

    html += '<div class="chat-item" onclick="openChatFromList(\'' + escHtml(it.type) + "','" + escHtml(it.id) + "','" + escHtml(it.otherId||'') + "')\">" +
      '<div class="avatar" onclick="' + avatarOnclick + '">' + avHtml + '</div>' +
      '<div class="chat-info">' +
        '<div class="chat-name">' + escHtml(it.name) + verifiedMark + '</div>' +
        '<div class="chat-preview">' + escHtml(it.lastMsg) + '</div>' +
      '</div>' +
      '<span class="chat-time">' + timeStr + '</span>' +
    '</div>';
  }
  listEl.innerHTML = html;
}

function openChatFromList(type, id, otherId) {
  if (type === 'dm') {
    openDmChat(otherId || id);
  } else if (type === 'group') {
    openGroupChat(id);
  } else if (type === 'support') {
    openSupportChatDirect(id);
  }
}

// ============ DM CHAT ============
async function openDmChat(otherId) {
  const dmId = [currentUser.id, otherId].sort().join('_');
  const msgPath = 'messages/dm_' + dmId;

  let otherUser = await fetchUser(otherId);
  if (!otherUser) otherUser = { id: otherId, nickname: otherId, avatar: '', bio: '' };

  const isVerified = (otherId === 'support' || otherUser.verified === true);
  currentChat = { id: dmId, type: 'dm', name: otherUser.nickname || otherId, avatar: otherUser.avatar || '', msgPath, otherId, showVerified: isVerified };

  setupChatUI();
  showScreen('chatScreen');
  listenMessages(msgPath);

  db.ref('dms/' + dmId).set(true);
}

// ============ GROUP CHAT ============
async function openGroupChat(groupId) {
  const msgPath = 'messages/group_' + groupId;
  let groupData = { id: groupId, name: groupId };
  try {
    const snap = await db.ref('groups/' + groupId).once('value');
    if (snap.exists()) groupData = { ...groupData, ...snap.val() };
  } catch(e) {}

  currentChat = { id: groupId, type: 'group', name: groupData.name, avatar: groupData.avatar || '', msgPath, groupData, showVerified: false };

  setupChatUI();
  showScreen('chatScreen');
  listenMessages(msgPath);

  // Live listener: update chat header if group data changes (e.g. after owner edits)
  if (groupSettingsLiveListener) { groupSettingsLiveListener(); groupSettingsLiveListener = null; }
  const groupRef = db.ref('groups/' + groupId);
  const groupCb = groupRef.on('value', snap => {
    if (!snap.exists() || !currentChat || currentChat.id !== groupId) return;
    const g = snap.val();
    currentChat.name = g.name;
    currentChat.avatar = g.avatar || '';
    currentChat.groupData = g;
    // Update header live
    const nameEl = document.getElementById('chatTitleName');
    const avatarEl = document.getElementById('chatAvatar');
    if (nameEl) nameEl.innerHTML = escHtml(g.name);
    if (avatarEl) avatarEl.innerHTML = g.avatar ? '<img src="' + escHtml(g.avatar) + '" alt="">' : getInitials(g.name);
  });
  groupSettingsLiveListener = () => groupRef.off('value', groupCb);
}

// ============ SUPPORT CHAT ============
function openSupportChat() {
  if (currentUser.id === 'support') {
    openAdminPanel();
    return;
  }
  const supportChatId = [currentUser.id, 'support'].sort().join('_');
  const msgPath = 'messages/support_' + supportChatId;
  currentChat = { id: supportChatId, type: 'support', name: 'Поддержка ALTMESSENGER', avatar: '', msgPath, otherId: 'support', showVerified: true };
  setupChatUI();
  showScreen('chatScreen');
  listenMessages(msgPath);

  db.ref('support_chats/' + supportChatId).set({ user: currentUser.id, created: Date.now() });
}

function openSupportChatDirect(chatId) {
  const msgPath = 'messages/support_' + chatId;
  const parts = chatId.split('_');
  const otherId = parts[0] === currentUser.id ? parts[1] : parts[0];
  const isAdmin = currentUser.id === 'support';
  const chatName = isAdmin ? '@' + otherId : 'Поддержка ALTMESSENGER';

  currentChat = { id: chatId, type: 'support', name: chatName, avatar: '', msgPath, otherId, showVerified: true };
  setupChatUI();
  showScreen('chatScreen');
  listenMessages(msgPath);
}

// ============ CHAT UI ============
function setupChatUI() {
  const avatarEl = document.getElementById('chatAvatar');
  const nameEl = document.getElementById('chatTitleName');
  const subEl = document.getElementById('chatTitleSub');
  const settingsBtn = document.getElementById('groupSettingsBtn');

  const initials = getInitials(currentChat.name);
  avatarEl.innerHTML = currentChat.avatar ? '<img src="' + escHtml(currentChat.avatar) + '" alt="">' : initials;

  if (currentChat.type === 'group') {
    avatarEl.onclick = function() { openGroupPreview(currentChat.id); };
  } else if (currentChat.otherId) {
    avatarEl.onclick = function() { openProfile(currentChat.otherId); };
  } else {
    avatarEl.onclick = null;
  }

  const verifiedHtml = currentChat.showVerified ? ' <span class="verified">✓</span>' : '';
  nameEl.innerHTML = escHtml(currentChat.name) + verifiedHtml;
  subEl.textContent = currentChat.type === 'group' ? 'Группа' : (currentChat.showVerified ? 'Поддержка' : 'Личные сообщения');

  // Show settings gear ONLY if current user is the group owner
  if (currentChat.type === 'group' && currentChat.groupData && currentChat.groupData.owner === currentUser.id) {
    settingsBtn.style.display = 'flex';
  } else {
    settingsBtn.style.display = 'none';
  }

  document.getElementById('messagesArea').innerHTML = '';
  document.getElementById('msgInput').value = '';
}

function listenMessages(path) {
  if (activeChatListener) { activeChatListener(); activeChatListener = null; }

  const area = document.getElementById('messagesArea');
  area.innerHTML = '';
  let isInitialLoad = true;
  let initialMsgs = [];

  const ref = db.ref(path).orderByChild('timestamp').limitToLast(100);

  const onAdded = ref.on('child_added', snap => {
    const msg = snap.val();
    if (isInitialLoad) {
      initialMsgs.push(msg);
    } else {
      appendMessage(msg, true);
    }
  });

  setTimeout(() => {
    isInitialLoad = false;
    initialMsgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    initialMsgs.forEach(m => appendMessage(m, false));
    scrollToBottom();
  }, 400);

  activeChatListener = () => { ref.off('child_added', onAdded); };
}

function appendMessage(msg, doScroll) {
  const area = document.getElementById('messagesArea');
  const isSent = msg.senderId === currentUser.id;
  const isFromSupport = msg.senderId === 'support';
  const isFromVerified = msg.senderVerified === true || isFromSupport;

  const div = document.createElement('div');
  div.className = 'msg ' + (isSent ? 'sent' : 'received');

  let senderHtml = '';
  if (!isSent && (currentChat.type === 'group')) {
    const verifiedMark = isFromVerified ? ' <span class="verified">✓</span>' : '';
    senderHtml = '<div class="msg-sender" onclick="openProfile(\'' + escHtml(msg.senderId) + '\')">' + escHtml(msg.senderName || msg.senderId) + verifiedMark + '</div>';
  }

  let contentHtml = '';
  const text = msg.text || '';
  const mediaHtml = detectMedia(text);
  if (mediaHtml) {
    contentHtml = mediaHtml;
    const cleanText = text.replace(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|mp4|webm)(\?\S*)?/gi, '').trim();
    if (cleanText) contentHtml += '<div>' + escHtml(cleanText) + '</div>';
  } else {
    contentHtml = escHtml(text);
  }

  const timeStr = formatTime(msg.timestamp);
  const verifiedTime = isFromVerified && !isSent ? ' <span class="verified">✓</span>' : '';

  div.innerHTML = senderHtml + contentHtml + '<div class="msg-time">' + timeStr + verifiedTime + '</div>';
  area.appendChild(div);

  if (doScroll) scrollToBottom();
}

function detectMedia(text) {
  const imgRegex = /(https?:\/\/\S+\.(jpg|jpeg|png|gif|webp)(\?\S*)?)/gi;
  const vidRegex = /(https?:\/\/\S+\.(mp4|webm)(\?\S*)?)/gi;
  let html = '';
  let imgMatch;
  while ((imgMatch = imgRegex.exec(text)) !== null) {
    html += '<div class="msg-media"><img src="' + escHtml(imgMatch[1]) + '" alt="image" onclick="openImageViewer(\'' + escHtml(imgMatch[1]) + '\')" loading="lazy"></div>';
  }
  let vidMatch;
  while ((vidMatch = vidRegex.exec(text)) !== null) {
    html += '<div class="msg-media"><video src="' + escHtml(vidMatch[1]) + '" controls preload="metadata"></video></div>';
  }
  return html;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const msg = {
    senderId: currentUser.id,
    senderName: currentUser.nickname,
    senderVerified: (currentUser.verified === true || currentUser.id === 'support'),
    text: text,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  };

  db.ref(currentChat.msgPath).push(msg);
  input.value = '';
  input.focus();
}

function scrollToBottom() {
  const area = document.getElementById('messagesArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function closeChat() {
  if (activeChatListener) { activeChatListener(); activeChatListener = null; }

}

  const row = document.getElementById('gsAccessKeyRow');
  if (row) row.style.display = checked ? 'block' : 'none';

async function saveGroupSettings(groupId) {
  const name = document.getElementById('gsName')?.value.trim();
  const bio = document.getElementById('gsBio')?.value.trim();
  const avatar = document.getElementById('gsAvatar')?.value.trim();
  const isPrivate = document.getElementById('gsPrivateToggle')?.checked;
  const accessKey = document.getElementById('gsAccessKey')?.value.trim();
  const errEl = document.getElementById('gsError');

  if (errEl) errEl.textContent = '';

  if (!name) {
    if (errEl) errEl.textContent = 'Название не может быть пустым';
    return;
  }
  if (isPrivate && !accessKey) {
    if (errEl) errEl.textContent = 'Укажите ключ доступа для приватной группы';
    return;
  }

  try {
    const updates = {
      name: name,
      bio: bio || '',
      avatar: avatar || '',
      privacy: isPrivate ? 'private' : 'public',
      accessKey: isPrivate ? accessKey : ''
    };

    // Write to Firebase — all members get the update live via the groupSettingsLiveListener
    await db.ref('groups/' + groupId).update(updates);

    // Update local currentChat state immediately
    if (currentChat && currentChat.id === groupId) {
      currentChat.name = name;
      currentChat.avatar = avatar || '';
      if (currentChat.groupData) Object.assign(currentChat.groupData, updates);
    }

    closeModal('groupSettingsModal');
  } catch(e) {
    console.error(e);
    if (errEl) errEl.textContent = 'Ошибка сохранения: ' + e.message;
  }
}

async function confirmDeleteGroup(groupId) {
  const confirmed = confirm('Удалить группу @' + groupId + '? Это действие нельзя отменить.');
  if (!confirmed) return;

  try {
    // Remove group data and messages
    await db.ref('groups/' + groupId).remove();
    await db.ref('messages/group_' + groupId).remove();

    // Remove from all members' joined_groups (best-effort, only owner's for now)
    await db.ref('users/' + currentUser.id + '/joined_groups/' + groupId).remove();

    closeModal('groupSettingsModal');
    closeChat();
  } catch(e) {
    console.error(e);
    alert('Ошибка удаления: ' + e.message);
  }
}

// ============ GLOBAL SEARCH ============
let searchDebounce = null;
function onGlobalSearch(query) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => doGlobalSearch(query), 250);
}

async function doGlobalSearch(query) {
  const resultsEl = document.getElementById('searchResults');
  const chatListEl = document.getElementById('chatList');
  const q = query.trim().toLowerCase().replace(/@/g, '');

  if (!q) {
    resultsEl.style.display = 'none';
    chatListEl.style.display = '';
    return;
  }

  resultsEl.style.display = 'block';
  chatListEl.style.display = 'none';

  try {
    const snap = await db.ref('groups').orderByKey().startAt(q).endAt(q + '\uf8ff').limitToFirst(10).once('value');
    const groups = snap.val() || {};

    const userSnap = await db.ref('users').orderByKey().startAt(q).endAt(q + '\uf8ff').limitToFirst(10).once('value');
    const users = userSnap.val() || {};

    let html = '';

    const groupKeys = Object.keys(groups);
    if (groupKeys.length > 0) {
      html += '<div class="sr-title">Группы</div>';
      for (const gid of groupKeys) {
        const g = groups[gid];
        const initials = getInitials(g.name || gid);
        const avHtml = g.avatar ? '<img src="' + escHtml(g.avatar) + '" alt="" style="width:100%;height:100%;object-fit:cover;">' : initials;
        html += '<div class="chat-item" onclick="openGroupPreview(\'' + escHtml(gid) + '\')">' +
          '<div class="avatar">' + avHtml + '</div>' +
          '<div class="chat-info">' +
            '<div class="chat-name">' + escHtml(g.name || gid) + '</div>' +
            '<div class="chat-preview">@' + escHtml(gid) + ' · ' + (g.privacy === 'private' ? '🔒 Приватная' : 'Открытая') + '</div>' +
          '</div>' +
        '</div>';
      }
    }

    const userKeys = Object.keys(users).filter(uid => uid !== currentUser.id);
    if (userKeys.length > 0) {
      html += '<div class="sr-title">Пользователи</div>';
      for (const uid of userKeys) {
        const u = users[uid];
        const isVerified = uid === 'support' || u.verified === true;
        const initials = getInitials(u.nickname || uid);
        const avHtml = u.avatar ? '<img src="' + escHtml(u.avatar) + '" alt="" style="width:100%;height:100%;object-fit:cover;">' : initials;
        const verified = isVerified ? ' <span class="verified">✓</span>' : '';
        html += '<div class="chat-item" onclick="openDmChat(\'' + escHtml(uid) + '\')">' +
          '<div class="avatar" onclick="event.stopPropagation();openProfile(\'' + escHtml(uid) + '\')">' + avHtml + '</div>' +
          '<div class="chat-info">' +
            '<div class="chat-name">' + escHtml(u.nickname || uid) + verified + '</div>' +
            '<div class="chat-preview">@' + escHtml(uid) + '</div>' +
          '</div>' +
        '</div>';
      }
    }

    if (!html) {
      html = '<div class="empty-state"><span class="emoji">🔍</span><p>Ничего не найдено</p></div>';
    }

    resultsEl.innerHTML = html;
  } catch(e) {
    resultsEl.innerHTML = '<div class="empty-state"><p>Ошибка поиска</p></div>';
    console.error(e);
  }
}

  document.getElementById('accessKeyRow').style.display = this.checked ? 'block' : 'none';

function openCreateGroup() {
  showScreen('createGroupScreen');
  document.getElementById('groupIdInput').value = '';
  document.getElementById('groupNameInput').value = '';
  document.getElementById('groupBioInput').value = '';
  document.getElementById('groupAvatarInput').value = '';
  document.getElementById('groupPrivateToggle').checked = false;
  document.getElementById('accessKeyRow').style.display = 'none';
  document.getElementById('groupAccessKey').value = '';
  document.getElementById('createGroupError').textContent = '';

async function createGroup() {
  const id = document.getElementById('groupIdInput').value.trim().toLowerCase();
  const name = document.getElementById('groupNameInput').value.trim();
  const bio = document.getElementById('groupBioInput').value.trim();
  const avatar = document.getElementById('groupAvatarInput').value.trim();
  const isPrivate = document.getElementById('groupPrivateToggle').checked;
  const accessKey = document.getElementById('groupAccessKey').value.trim();
  const errEl = document.getElementById('createGroupError');
  errEl.textContent = '';

  if (!id || !name) { errEl.textContent = 'Заполните ID и название'; return; }
  if (!/^[a-z0-9]{4,30}$/.test(id)) { errEl.textContent = 'ID: только a-z, 0-9 (4-30 символов)'; return; }
  if (isPrivate && !accessKey) { errEl.textContent = 'Укажите ключ доступа для приватной группы'; return; }

  try {
    const snap = await db.ref('groups/' + id).once('value');
    if (snap.exists()) { errEl.textContent = 'Этот @ID группы уже занят'; return; }

    const groupData = {
      id: id,
      name: name,
      bio: bio,
      avatar: avatar,
      privacy: isPrivate ? 'private' : 'public',
      accessKey: isPrivate ? accessKey : '',
      owner: currentUser.id,
      created: Date.now(),
      members: { [currentUser.id]: true }
    };

    await db.ref('groups/' + id).set(groupData);
    await db.ref('users/' + currentUser.id + '/joined_groups/' + id).set(true);
    showScreen('mainScreen');
  } catch(e) {
    errEl.textContent = 'Ошибка: ' + e.message;
    console.error(e);
  }
}

let adminTicketListener = null;

function openAdminPanel() {
  showScreen('adminScreen');

function loadTickets() {
  const listEl = document.getElementById('ticketList');
  listEl.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>';

  if (adminTicketListener) {
    db.ref('support_chats').off('value', adminTicketListener);
  }

  adminTicketListener = db.ref('support_chats').on('value', async snap => {
    const chats = snap.val() || {};
    const keys = Object.keys(chats);
    if (keys.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>Нет обращений</p></div>';
      return;
    }

    let html = '';
    for (const chatId of keys) {
      const c = chats[chatId];
      const userId = c.user || chatId.split('_').find(p => p !== 'support') || 'unknown';
      let userName = userId;
      let userAvatar = '';
      const u = await fetchUser(userId);
      if (u) {
        userName = u.nickname || userId;
        userAvatar = u.avatar || '';
      }

      let lastMsg = '';
      try {
        const mSnap = await db.ref('messages/support_' + chatId).orderByKey().limitToLast(1).once('value');
        mSnap.forEach(m => { lastMsg = m.val().text || ''; });
      } catch(e) {}

      const initials = getInitials(userName);
      const avHtml = userAvatar ? '<img src="' + escHtml(userAvatar) + '" alt="">' : initials;

      html += '<div class="ticket-item" onclick="openSupportChatDirect(\'' + escHtml(chatId) + '\')">' +
        '<div class="ticket-avatar">' + avHtml + '</div>' +
        '<div class="ticket-info">' +
          '<div class="ticket-name">@' + escHtml(userId) + ' — ' + escHtml(userName) + '</div>' +
          '<div class="ticket-preview">' + escHtml(lastMsg) + '</div>' +
        '</div>' +
      '</div>';
    }
    listEl.innerHTML = html;
  });
}

async function openProfile(userId) {

  inner.innerHTML = '<button class="modal-close" onclick="closeModal(\'profileModal\')">✕</button>' +

  modal.classList.add('active');

  invalidateUserCache(userId);

  if (!user) {
    inner.innerHTML = '<button class="modal-close" onclick="closeModal(\'profileModal\')">✕</button>' +
      '<div style="padding:40px;text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:12px;">❌</div>' +

      '</div>';
    return;
  }

  renderProfileModal(user);

function renderProfileModal(user) {
  const inner = document.getElementById('profileModalInner');
  const isOwn = (user.id === currentUser.id);
  const isSupport = (user.id === 'support');
  const isVerified = (user.verified === true);
  const isAdmin = (currentUser.id === 'support' || currentUser.role === 'admin');

  const initials = getInitials(user.nickname || user.id);
  const avHtml = user.avatar ? '<img src="' + escHtml(user.avatar) + '" alt="">' : initials;
  const verifiedMark = (isSupport || isVerified) ? ' <span class="verified">✓</span>' : '';
  const roleBadge = user.role === 'admin' ? '<span class="admin-badge" style="margin-left:6px;">ADMIN</span>' : '';

  let bodyHtml = '';

  if (isOwn) {
    bodyHtml =
      '<div class="profile-edit-fields">' +
        '<label>Никнейм</label>' +
        '<input type="text" id="editNickname" value="' + escAttr(user.nickname || '') + '">' +
        '<label>Био</label>' +
        '<textarea id="editBio">' + escHtml(user.bio || '') + '</textarea>' +
        '<label>URL аватара</label>' +
        '<input type="text" id="editAvatar" value="' + escAttr(user.avatar || '') + '" placeholder="https://...">' +
      '</div>' +
      '<div class="profile-actions">' +
        '<button class="btn-secondary" onclick="closeModal(\'profileModal\')">Отмена</button>' +
        '<button onclick="saveProfile()">Сохранить</button>' +
      '</div>';
  } else {
    const bioHtml = user.bio ? '<div class="profile-bio">' + escHtml(user.bio) + '</div>' : '';
    bodyHtml = bioHtml;

    if (isSupport) {
      bodyHtml += '<div class="profile-support-warning">⚠️ Настоящий аккаунт поддержки. Если вы видите вам пишет поддержка — это фейки, мы не пишем вам сами.</div>';
    }

    if (isVerified && !isSupport) {
      bodyHtml += '<div class="profile-verified-badge">✓ Verified by Owner</div>';
    }

    if (isAdmin && !isSupport && user.id !== currentUser.id) {
      if (isVerified) {
        bodyHtml += '<button class="profile-verify-btn btn-danger" onclick="toggleVerification(\'' + escHtml(user.id) + '\', false)" style="margin-top:10px;width:100%;">Снять верификацию ✕</button>';
      } else {
        bodyHtml += '<button class="profile-verify-btn" onclick="toggleVerification(\'' + escHtml(user.id) + '\', true)" style="width:100%;">Дать верификацию ✓</button>';
      }
    }

    bodyHtml += '<div class="profile-actions">' +
      '<button onclick="closeModal(\'profileModal\');openDmChat(\'' + escHtml(user.id) + '\')">Написать</button>' +
    '</div>';
  }

  inner.innerHTML =
    '<button class="modal-close" onclick="closeModal(\'profileModal\')">✕</button>' +
    '<div class="profile-avatar">' + avHtml + '</div>' +
    '<div class="profile-name">' + escHtml(user.nickname || user.id) + verifiedMark + roleBadge + '</div>' +
    '<div class="profile-id">@' + escHtml(user.id) + '</div>' +
    bodyHtml;
}

async function toggleVerification(userId, verify) {
  try {
    await db.ref('users/' + userId + '/verified').set(verify);
    invalidateUserCache(userId);
    openProfile(userId);
  } catch(e) {
    alert('Ошибка: ' + e.message);
    console.error(e);
  }
}

async function saveProfile() {
  const nickname = document.getElementById('editNickname')?.value.trim();
  const bio = document.getElementById('editBio')?.value.trim();
  const avatar = document.getElementById('editAvatar')?.value.trim();

  if (!nickname) { alert('Никнейм не может быть пустым'); return; }

  try {
    const updates = { nickname: nickname, bio: bio || '', avatar: avatar || '' };
    await db.ref('users/' + currentUser.id).update(updates);

    currentUser.nickname = nickname;
    currentUser.bio = bio || '';
    currentUser.avatar = avatar || '';
    localStorage.setItem('current_user', JSON.stringify(currentUser));
    invalidateUserCache(currentUser.id);

    closeModal('profileModal');
  } catch(e) {
    alert('Ошибка сохранения: ' + e.message);
  }
}

// ============ UTILITY ============
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = pad(d.getHours()) + ':' + pad(d.getMinutes());
  if (d.toDateString() === now.toDateString()) return time;
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Вчера ' + time;
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + ' ' + time;
}

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function escAttr(str) {
  return String(str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============ BOOT ============
(function boot() {
  const saved = localStorage.getItem('current_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser && currentUser.id) {
        db.ref('users/' + currentUser.id).once('value').then(snap => {
          if (snap.exists()) {
            const fresh = snap.val();
            currentUser = { ...currentUser, ...fresh };
            localStorage.setItem('current_user', JSON.stringify(currentUser));
          }
          initApp();
        }).catch(() => initApp());
        return;
      }
    } catch(e) {}
  }
  showScreen('authScreen');
})();
</script>
